name: Daily Korean Lesson

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-lesson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily lesson to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/send_daily_lesson.js

      - name: Commit progress update
        run: |
          git config --global user.name 'TOPIK Bot'
          git config --global user.email 'topik-bot@users.noreply.github.com'
          git add progress.json
          git diff --staged --quiet || git commit -m "Day sent: progress updated"
          git push
